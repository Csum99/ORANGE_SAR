# Simulation type; options are ['point', 'image', 'image_misaligned']
sim_type: 'image'

# Radar/waveform parameters
center_freq: 4062500000 # (Hz)
bandwidth: 2437500000 # (Hz)
scan_rate: 200 # (Hz)
duration: 16 # (seconds)
range_min: 10 # (m)
range_max: 100 # (m)

# Platform motion parameters
platform_init_pos: [-8, 30, 10] # Relative to image center; [X, Y, Z] (meters)
platform_vel: [2, 0, 0] # [X, Y, Z] (meters/second)

# Image scatterer parameters
source_image: './images/main_image_star-forming_region_carina_nircam_final-5mb.jpg'
downsampling_factor: 5
image_center: [0, 0] # [X, Y] (meters)
pixel_res: [0.05, 0.05] # [X, Y] (meters)
pixel_thresholds: [0, 255] 

# Propogation loss
prop_loss: False

# Beam parameters
beam_limited: False
beamwidth: 90 # (degrees)

# Noise parameters
add_noise: True
noise_magnitude: 4